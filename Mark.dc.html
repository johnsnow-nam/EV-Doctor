<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<sc-if value="{{ isYes }}" hint-placeholder-val="{{ true }}"><span style="display:inline-flex;align-items:center;justify-content:center;width:100%;font:600 15px/1 var(--font-mono);color:var(--charge)">●</span></sc-if><sc-if value="{{ isPartial }}" hint-placeholder-val="{{ false }}"><span style="display:inline-flex;align-items:center;justify-content:center;width:100%;font:600 14px/1 var(--font-mono);color:var(--warning)">◐</span></sc-if><sc-if value="{{ isNo }}" hint-placeholder-val="{{ false }}"><span style="display:inline-flex;align-items:center;justify-content:center;width:100%;font:400 15px/1 var(--font-mono);color:var(--muted)">–</span></sc-if>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:24,&quot;height&quot;:24},&quot;v&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;yes&quot;,&quot;partial&quot;,&quot;no&quot;],&quot;default&quot;:&quot;yes&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const v = this.props.v;
    return { isYes: v === 'yes', isPartial: v === 'partial', isNo: v === 'no' || v == null };
  }
}
</script>
</body>
</html>
